<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<body>
    <h1>Count: </h1>
    <h1 id="count"> 0 </h1>
    <button id="incbtn" onclick="increment();">+</button>
    <button id="decbtn" onclick="decrement();">-</button>
    <button id="reset" onclick="reset();">RESET</button>
</body>

<script>
    let count = 0;
    function increment(){
        count++;
        let text = document.querySelector("#count");
        text.innerText = count;      
    }

    function decrement(){
        count--;
        let text = document.querySelector("#count");
        text.innerText = count;
    }

    function reset(){
        count = 0;
        let text = document.querySelector("#count");
        text.innerText = count;
    }

</script>
</html>
