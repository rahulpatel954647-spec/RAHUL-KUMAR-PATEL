<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

    <form>
        <label>Name: </label>
        <input type="text" placeholder="Enter your name">
        <br>

        <label>Age:</label>
        <input type="number" placeholder="Enter your age"><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Password:</label>
        <input type="password" placeholder="Enter your password"> <br>

        <label>Gender:</label>

        <input type="radio" value="Male" name="gender">Male

        <input type="radio" value="Female" name="gender">Female
        <br>

        <label>Hobbies:</label>

        <input type="checkbox" value="Painting">Painting

        <input type="checkbox" value="Gardening">Gardening

        <input type="checkbox" value="Cooking">Cooking
        <br>

        <label>City:</label>

        <select >
            <option ></option>
            <option selected>New delhi</option>
            <option>Mumbai</option>
            <option>Kolkata</option>
        </select>

        <label>DOB:</label>
        <input type="date" placeholder="Enter your birth date">

    </form>
    
</body>
</html>
